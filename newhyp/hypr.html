<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Eternal Love 💕</title>

    <!-- Advanced libraries for effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Dancing Script', 'Segoe UI', cursive, sans-serif;
            color: white;
        }

        /* Import romantic fonts */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Parisienne&display=swap');

        /* Main container */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Canvas for Three.js background */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay content */
        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* Photo frame with romantic effects */
        .photo-frame {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            padding: 8px;
            background: linear-gradient(45deg, #ff4da6, #ff99cc, #ff4da6, #ff99cc);
            background-size: 300% 300%;
            animation: gradientShift 5s ease infinite, float 3s ease-in-out infinite;
            box-shadow: 0 0 50px rgba(255, 77, 166, 0.7),
                0 0 100px rgba(255, 77, 166, 0.5),
                0 0 150px rgba(255, 77, 166, 0.3),
                inset 0 0 30px rgba(255, 255, 255, 0.8);
            position: relative;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .photo-frame:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 70px rgba(255, 77, 166, 0.9),
                0 0 140px rgba(255, 77, 166, 0.7),
                0 0 210px rgba(255, 77, 166, 0.5);
        }

        .photo-frame::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff4da6, transparent, #ff99cc, transparent);
            animation: rotate 4s linear infinite;
            z-index: -1;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        /* Heart particles container */
        .heart-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Romantic text */
        .love-text {
            text-align: center;
            z-index: 3;
        }

        .love-text h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            background: linear-gradient(45deg, #ff4da6, #ff99cc, #ff66b2, #ff3385);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite, glow 2s ease-in-out infinite alternate;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 77, 166, 0.5);
            letter-spacing: 2px;
        }

        .love-text h2 {
            font-family: 'Parisienne', cursive;
            font-size: 3rem;
            color: white;
            text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff99cc;
            animation: fadeInOut 3s ease infinite;
            margin-bottom: 15px;
        }

        .love-text p {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #ffccff;
            text-shadow: 0 0 15px #ff4da6;
            animation: slideIn 2s ease forwards;
            opacity: 0;
            animation-delay: 1s;
        }

        /* Message container */
        .message-container {
            position: absolute;
            bottom: 15%;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 3;
            pointer-events: none;
        }

        .romantic-message {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            border-radius: 50px;
            display: inline-block;
            border: 2px solid rgba(255, 77, 166, 0.5);
            box-shadow: 0 0 30px rgba(255, 77, 166, 0.3);
            animation: messagePulse 2s ease infinite;
        }

        .romantic-message i {
            color: #ff4da6;
            margin: 0 10px;
            animation: heartBeat 1s ease infinite;
        }

        /* Floating hearts */
        .floating-heart {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            animation: floatHeart 4s ease-in infinite;
            z-index: 2;
            pointer-events: none;
        }

        /* Countdown timer */
        .countdown {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 77, 166, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 77, 166, 0.5);
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            text-align: center;
            animation: glow 2s ease-in-out infinite alternate;
            z-index: 3;
            pointer-events: none;
        }

        .countdown span {
            font-size: 2rem;
            font-weight: bold;
            color: #ff99cc;
            display: block;
        }

        /* Music player */
        .music-player {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 77, 166, 0.2);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 77, 166, 0.5);
            color: white;
            cursor: pointer;
            pointer-events: auto;
            z-index: 3;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-player:hover {
            background: rgba(255, 77, 166, 0.4);
            transform: scale(1.05);
        }

        .music-player i {
            font-size: 1.5rem;
            color: #ff99cc;
            animation: spin 3s linear infinite;
        }

        /* Photo gallery */
        .photo-gallery {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 3;
            pointer-events: auto;
        }

        .gallery-thumb {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 77, 166, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: galleryFloat 3s ease-in-out infinite;
        }

        .gallery-thumb:nth-child(2) {
            animation-delay: 0.5s;
        }

        .gallery-thumb:nth-child(3) {
            animation-delay: 1s;
        }

        .gallery-thumb:hover {
            transform: scale(1.2) rotate(5deg);
            border-color: #ff99cc;
            box-shadow: 0 0 20px #ff4da6;
        }

        .gallery-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Animations */
        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff99cc, 0 0 60px #ff66b2;
            }

            to {
                text-shadow: 0 0 30px #ff99cc, 0 0 60px #ff4da6, 0 0 90px #ff3385;
            }
        }

        @keyframes fadeInOut {

            0%,
            100% {
                opacity: 0.7;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes messagePulse {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(255, 77, 166, 0.3);
                border-color: rgba(255, 77, 166, 0.5);
            }

            50% {
                box-shadow: 0 0 50px rgba(255, 77, 166, 0.6);
                border-color: rgba(255, 153, 204, 0.8);
            }
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes heartBeat {

            0%,
            100% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.2);
            }

            50% {
                transform: scale(1);
            }

            75% {
                transform: scale(1.2);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes galleryFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .love-text h1 {
                font-size: 3rem;
            }

            .love-text h2 {
                font-size: 2rem;
            }

            .love-text p {
                font-size: 1.5rem;
            }

            .photo-frame {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>

<body>
    <!-- Three.js Container for 3D Background -->
    <div id="canvas-container"></div>

    <!-- Floating Hearts Particles -->
    <div class="heart-particles" id="heart-particles"></div>

    <!-- Main Content -->
    <div class="content">
        <!-- Photo Frame with 3D Effect -->
        <div class="photo-frame" onclick="createHeartExplosion(event)">
            <!-- Replace 'her-photo.jpg' with your actual photo path -->
            <img src="her.jpg" alt="My Love" id="love-photo">
        </div>

        <!-- Romantic Text -->
        <div class="love-text">
            <h1>My Dearest Love</h1>
            <h2 id="dynamic-name"></h2>
            <p>You are my everything ❤️</p>
        </div>
    </div>

    <!-- Message Container -->
    <div class="message-container">
        <div class="romantic-message">
            <i>❤️</i> You are the most beautiful part of my life <i>❤️</i>
        </div>
    </div>

    <!-- Countdown Timer -->
    <div class="countdown" id="countdown">
        <div>Together Forever</div>
        <span id="timer">00:00:00:00</span>
    </div>

    <!-- Music Player -->
    <div class="music-player" onclick="toggleMusic()">
        <i id="music-icon">♪</i>
        <span id="music-text">Play Love Song</span>
    </div>

    <!-- Photo Gallery -->
    <div class="photo-gallery">
        <div class="gallery-thumb" onclick="changePhoto(0)">
            <img src="her1.jpg" alt="Memory 1">
        </div>
        <div class="gallery-thumb" onclick="changePhoto(1)">
            <img src="her2.jpg" alt="Memory 2">
        </div>
        <div class="gallery-thumb" onclick="changePhoto(2)">
            <img src="her3.jpg" alt="Memory 3">
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <iframe width="0" height="0"
        src="https://www.youtube.com/embed/x9zIEc7DS8w?autoplay=1&mute=1&loop=1&playlist=x9zIEc7DS8w" frameborder="0"
        allow="autoplay; encrypted-media" allowfullscreen>
    </iframe>

    <script>
        // =============================================
        // THREE.JS 3D BACKGROUND
        // =============================================
        function initThreeJS() {
            const container = document.getElementById('canvas-container');

            // Scene setup
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a001a);

            // Camera
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            // Renderer
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Create heart particles
            const heartGeometry = new THREE.BufferGeometry();
            const heartCount = 500;
            const positions = new Float32Array(heartCount * 3);
            const colors = new Float32Array(heartCount * 3);

            for (let i = 0; i < heartCount; i++) {
                // Random positions in a sphere
                const radius = 20;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);

                // Random colors (pink to red)
                colors[i * 3] = 1; // R
                colors[i * 3 + 1] = 0.3 + Math.random() * 0.4; // G
                colors[i * 3 + 2] = 0.5 + Math.random() * 0.5; // B
            }

            heartGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            heartGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // Create heart shape texture
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff4da6';
            ctx.beginPath();
            ctx.moveTo(16, 16);
            ctx.bezierCurveTo(8, 8, 2, 12, 16, 24);
            ctx.bezierCurveTo(30, 12, 24, 8, 16, 16);
            ctx.fill();

            const texture = new THREE.CanvasTexture(canvas);

            const heartMaterial = new THREE.PointsMaterial({
                size: 0.5,
                map: texture,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true
            });

            const heartParticles = new THREE.Points(heartGeometry, heartMaterial);
            scene.add(heartParticles);

            // Add floating lights
            const light1 = new THREE.PointLight(0xff4da6, 1, 50);
            light1.position.set(10, 10, 10);
            scene.add(light1);

            const light2 = new THREE.PointLight(0xff99cc, 1, 50);
            light2.position.set(-10, -10, 10);
            scene.add(light2);

            // Animation
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);

                time += 0.005;

                // Rotate particles
                heartParticles.rotation.y += 0.001;
                heartParticles.rotation.x += 0.0005;

                // Animate lights
                light1.position.x = Math.sin(time) * 15;
                light1.position.y = Math.cos(time) * 15;
                light2.position.x = Math.sin(time + Math.PI) * 15;
                light2.position.y = Math.cos(time + Math.PI) * 15;

                renderer.render(scene, camera);
            }

            animate();

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // =============================================
        // FLOATING HEARTS
        // =============================================
        function createFloatingHearts() {
            const container = document.getElementById('heart-particles');
            const heartSymbols = ['❤️', '💕', '💖', '💗', '💓', '💘', '💝', '💞'];

            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                heart.style.color = `hsl(${Math.random() * 20 + 340}, 100%, 70%)`;

                container.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 6000);
            }, 300);
        }

        // =============================================
        // HEART EXPLOSION ON CLICK
        // =============================================
        function createHeartExplosion(event) {
            const rect = event.target.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = ['❤️', '💕', '💖', '💗'][Math.floor(Math.random() * 4)];
                heart.style.left = centerX + 'px';
                heart.style.top = centerY + 'px';
                heart.style.fontSize = '30px';
                heart.style.position = 'fixed';
                heart.style.animation = 'none';
                heart.style.transform = `translate(${Math.random() * 200 - 100}px, ${Math.random() * 200 - 100}px) rotate(${Math.random() * 360}deg)`;
                heart.style.opacity = '1';
                heart.style.transition = 'all 1s ease';

                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.style.opacity = '0';
                    heart.style.transform += ` translateY(-100px)`;
                }, 50);

                setTimeout(() => {
                    heart.remove();
                }, 1050);
            }

            // GSAP animation for photo
            gsap.to('.photo-frame', {
                scale: 1.2,
                duration: 0.3,
                yoyo: true,
                repeat: 1,
                ease: "power2.inOut"
            });
        }

        // =============================================
        // COUNTDOWN TIMER
        // =============================================
        function updateCountdown() {
            const startDate = new Date(); // Your relationship start date
            const currentDate = new Date();

            const diffTime = Math.abs(currentDate - startDate);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const diffHours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const diffMinutes = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
            const diffSeconds = Math.floor((diffTime % (1000 * 60)) / 1000);

            document.getElementById('timer').innerHTML =
                `${String(diffDays).padStart(2, '0')}:${String(diffHours).padStart(2, '0')}:${String(diffMinutes).padStart(2, '0')}:${String(diffSeconds).padStart(2, '0')}`;
        }

        setInterval(updateCountdown, 1000);

        // =============================================
        // MUSIC PLAYER
        // =============================================
        let isPlaying = false;
        const audio = document.getElementById('love-song');
        const musicIcon = document.getElementById('music-icon');
        const musicText = document.getElementById('music-text');

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                musicIcon.innerHTML = '♪';
                musicText.innerHTML = 'Play Love Song';
            } else {
                audio.play().catch(e => console.log('Audio play failed:', e));
                musicIcon.innerHTML = '♫';
                musicText.innerHTML = 'Playing...';
            }
            isPlaying = !isPlaying;

            // Animation
            gsap.to('.music-player', {
                scale: 1.1,
                duration: 0.2,
                yoyo: true,
                repeat: 1
            });
        }

        // =============================================
        // PHOTO GALLERY
        // =============================================
        const photos = [
            'her-photo.jpg',
            'her-photo-1.jpg',
            'her-photo-2.jpg',
            'her-photo-3.jpg'
        ];
        let currentPhotoIndex = 0;

        function changePhoto(index) {
            currentPhotoIndex = index;
            const photo = document.getElementById('love-photo');

            // Fade out
            gsap.to(photo, {
                opacity: 0,
                duration: 0.3,
                onComplete: () => {
                    photo.src = photos[index] || photos[0];
                    // Fade in
                    gsap.to(photo, {
                        opacity: 1,
                        duration: 0.3,
                        scale: 1.1,
                        yoyo: true,
                        repeat: 1
                    });
                }
            });

            // Highlight selected thumbnail
            document.querySelectorAll('.gallery-thumb').forEach((thumb, i) => {
                if (i === index) {
                    gsap.to(thumb, {
                        scale: 1.2,
                        borderColor: '#ff99cc',
                        boxShadow: '0 0 30px #ff4da6',
                        duration: 0.3
                    });
                } else {
                    gsap.to(thumb, {
                        scale: 1,
                        borderColor: 'rgba(255, 77, 166, 0.5)',
                        boxShadow: 'none',
                        duration: 0.3
                    });
                }
            });
        }

        // =============================================
        // NAME TYPING ANIMATION
        // =============================================
        function typeWriter() {
            const names = ['My Princess', 'My Angel', 'My Queen', 'My Everything'];
            let index = 0;
            const element = document.getElementById('dynamic-name');

            setInterval(() => {
                index = (index + 1) % names.length;

                gsap.to(element, {
                    opacity: 0,
                    duration: 0.5,
                    onComplete: () => {
                        element.innerHTML = names[index];
                        gsap.to(element, {
                            opacity: 1,
                            duration: 0.5
                        });
                    }
                });
            }, 3000);
        }

        // =============================================
        // PARALLAX EFFECT
        // =============================================
        function initParallax() {
            document.addEventListener('mousemove', (e) => {
                const mouseX = e.clientX / window.innerWidth - 0.5;
                const mouseY = e.clientY / window.innerHeight - 0.5;

                gsap.to('.photo-frame', {
                    x: mouseX * 30,
                    y: mouseY * 30,
                    rotationY: mouseX * 10,
                    rotationX: mouseY * -10,
                    duration: 1
                });

                gsap.to('.love-text h1', {
                    x: mouseX * -20,
                    y: mouseY * -20,
                    duration: 1
                });
            });
        }

        // =============================================
        // INITIALIZE EVERYTHING
        // =============================================
        window.onload = () => {
            initThreeJS();
            createFloatingHearts();
            typeWriter();
            initParallax();
            updateCountdown();

            // GSAP timeline entrance animation
            const tl = gsap.timeline();

            tl.from('.photo-frame', {
                scale: 0,
                rotation: -180,
                duration: 1.5,
                ease: "elastic.out(1, 0.3)"
            })
                .from('.love-text h1', {
                    y: 100,
                    opacity: 0,
                    duration: 1,
                    ease: "power2.out"
                }, "-=1")
                .from('.love-text h2', {
                    y: 50,
                    opacity: 0,
                    duration: 1,
                    ease: "power2.out"
                }, "-=0.7")
                .from('.love-text p', {
                    y: 30,
                    opacity: 0,
                    duration: 1,
                    ease: "power2.out"
                }, "-=0.5")
                .from('.romantic-message', {
                    scale: 0,
                    opacity: 0,
                    duration: 1,
                    ease: "backOut(1.7)"
                }, "-=0.3");
        };
    </script>
</body>

</html>
